<div id="htmlEmbed1"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<script type="text/babel">
  const { useState, useEffect } = React;

  // IMPORTANT: API Key variable added as requested
  const apiKey = "AIzaSyC6jILC-M0dFNNTEgxhylcGv-x0bP0E57g";

  const App = () => {
    const [tier, setTier] = useState('Loading...');
    const [usage, setUsage] = useState(0);

    useEffect(() => {
      const handleMessage = (e) => {
        // CHECK 1: Is the message even arriving?
        console.log("Antigravity received raw data:", e.data);

        if (e.data && e.data.type === 'SYNC_PLAN') {
          // CHECK 2: Is the tier coming through as "Pro" or "Free"?
          console.log("Setting Tier to:", e.data.tier);
          setTier(e.data.tier);
          setUsage(e.data.usage);
          // Tell Wix we got the message so it stops pulsing
          window.parent.postMessage({ type: 'SYNC_CONFIRMED' }, "*");
        }
      };

      window.addEventListener('message', handleMessage);
      
      // CHECK 3: Tell Wix "I am awake!"
      window.parent.postMessage({ type: 'READY' }, "*");

      return () => window.removeEventListener('message', handleMessage);
    }, []);

    const limits = { 'Free': 14, 'Starter': 150, 'Pro': 300, 'Elite': 600, 'Loading...': 0 };

    return (
      <div className="p-10 bg-white border-2 border-stone-200 rounded-3xl text-center font-sans">
        <h1 className="text-3xl font-serif font-bold mb-2">The Calm Companion</h1>
        <div className="inline-block px-4 py-1 bg-stone-100 rounded-full text-sm font-bold uppercase tracking-widest mb-6">
          {tier} Plan
        </div>
        
        <div className="text-6xl font-bold mb-2">{usage}/{limits[tier] || 0}</div>
        <p className="text-stone-400 italic">Runs remaining this month</p>
        
        {tier === 'Free' && (
          <div className="mt-8 p-4 bg-amber-50 text-amber-700 rounded-xl border border-amber-100">
            Looks like you're on the Free trial. If you just upgraded, stay on this page for 10 seconds.
          </div>
        )}
      </div>
    );
  };

  // Using htmlEmbed1 as per previous layout requirement
  const root = ReactDOM.createRoot(document.getElementById('htmlEmbed1'));
  root.render(<App />);
</script>
