<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Companion Embed</title>
    
    <!-- 3. The Script Tags: React and Lucide at the top -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Calistoga&display=swap');
    </style>
</head>
<body>

    <!-- 1. The ID: Set to htmlEmbed1 -->
    <div id="htmlEmbed1"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 2. The API Key: Gemini Key included
        const apiKey = "AIzaSyC6jILC-M0dFNNTEgxhylcGv-x0bP0E57g"; 

        const App = () => {
            const [userTier, setUserTier] = useState('Free');
            const [runsUsed, setRunsUsed] = useState(0);
            const [activeTool, setActiveTool] = useState('voice');
            const [input, setInput] = useState('');
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);

            const tiers = {
                'Free': { limit: 14, label: 'Free Kit', color: 'text-stone-400' },
                'Starter': { limit: 150, label: 'Starter Plan', color: 'text-emerald-600' },
                'Pro': { limit: 300, label: 'Pro Plan', color: 'text-indigo-600' },
                'Elite': { limit: 600, label: 'Elite Plan', color: 'text-purple-600' }
            };

            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data.type === 'SYNC_PLAN') {
                        setUserTier(event.data.tier || 'Free');
                        setRunsUsed(event.data.usage || 0);
                    }
                };
                window.addEventListener('message', handleMessage);
                window.parent.postMessage({ type: 'READY' }, "*");
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            const tools = {
                voice: { title: 'Find Your Voice', desc: 'Analyze your writing DNA.' },
                bio: { title: 'Bio Builder', desc: 'Craft your social identity.' },
                hook: { title: 'Find Your Hook', desc: 'Create scroll-stopping headlines.' },
                multiplier: { title: 'The Multiplier', desc: 'Turn 1 idea into 3 assets.' },
                planner: { title: 'Content Planner', desc: 'Map your week.' }
            };

            const handleGenerate = async () => {
                if (runsUsed >= (tiers[userTier]?.limit || 14)) return;
                setLoading(true);
                try {
                    // Gemini API Call
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Tool: ${activeTool}\nInput: ${input}` }] }]
                        })
                    });
                    const data = await response.json();
                    setResult(data?.candidates?.[0]?.content?.parts?.[0]?.text || "No result found.");
                    
                    // Notify parent of usage
                    const newCount = runsUsed + 1;
                    setRunsUsed(newCount);
                    window.parent.postMessage({ type: 'UPDATE_USAGE', newCount: newCount, toolType: activeTool }, "*");
                } catch (err) {
                    console.error("API Error:", err);
                    setResult("Error generating content.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="p-6 bg-white min-h-screen font-sans">
                    <div className="flex justify-between items-center mb-6 border-b pb-4">
                        <div>
                            <h2 className="text-xl font-serif font-bold text-stone-800">The Content Companion {tiers[userTier]?.label}</h2>
                            <p className="text-xs text-stone-400">Your tools are ready to grow with you. ✨</p>
                        </div>
                        <div className="text-right">
                            <div className={`text-xs font-bold uppercase tracking-widest ${tiers[userTier]?.color}`}>✦ {userTier} Plan</div>
                            <div className="text-sm font-medium bg-stone-100 px-3 py-1 rounded-full mt-1">
                                {runsUsed}/{tiers[userTier]?.limit} Runs Left
                            </div>
                        </div>
                    </div>

                    <div className="max-w-2xl mx-auto mt-10 p-8 border border-stone-100 rounded-3xl shadow-sm bg-stone-50/30">
                        <h3 className="text-2xl font-serif font-bold mb-2">{tools[activeTool].title}</h3>
                        <p className="text-sm text-stone-500 mb-6">{tools[activeTool].desc}</p>
                        <textarea 
                            className="w-full h-40 p-4 rounded-2xl border border-stone-200 focus:ring-2 focus:ring-stone-400 outline-none transition-all"
                            placeholder="Paste your content here..."
                            value={input}
                            onChange={(e) => setInput(e.target.value)}
                        />
                        <button 
                            onClick={handleGenerate}
                            disabled={loading || runsUsed >= (tiers[userTier]?.limit || 14)}
                            className="w-full mt-6 py-4 bg-[#809275] hover:bg-[#6b7b62] text-white font-bold rounded-xl transition-all disabled:opacity-50"
                        >
                            {loading ? "Thinking..." : `Analyze My ${activeTool.charAt(0).toUpperCase() + activeTool.slice(1)}`}
                        </button>
                        {result && (
                            <div className="mt-8 p-4 bg-white border border-stone-100 rounded-2xl whitespace-pre-wrap text-stone-700">
                                {result}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('htmlEmbed1'));
        root.render(<App />);
    </script>
</body>
</html>
