<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Companion Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Calistoga&display=swap');

        :root {
            --primary-green: #7d8a70;
            --primary-hover: #6a765f;
            --bg-stone: #fcfcf9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-stone);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .font-serif {
            font-family: 'Calistoga', serif;
        }

        /* --- CUSTOM SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }

        .tool-card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const tiers = {
                'Free': { limit: 14, color: 'text-stone-400', bg: 'bg-stone-50' },
                'Starter': { limit: 150, color: 'text-emerald-600', bg: 'bg-emerald-50' },
                'Pro': { limit: 300, color: 'text-indigo-600', bg: 'bg-indigo-50' },
                'Elite': { limit: 600, color: 'text-purple-600', bg: 'bg-purple-50' }
            };

            const [userStats, setUserStats] = useState({
                tier: 'Free',
                usage: { voice: 0, bio: 0, hook: 0, plan: 0, multiplier: 0 },
                dailyLimit: 14
            });

            const [activeTool, setActiveTool] = useState('home');
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [successMessage, setSuccessMessage] = useState('');
            const [isSyncing, setIsSyncing] = useState(false);

            // Tools Config
            const tools = {
                voice: { 
                    id: 'voice', 
                    title: 'Find Your Voice', 
                    icon: 'mic-2', 
                    color: 'text-indigo-600', 
                    bg: 'bg-indigo-50',
                    desc: 'Analyze your writing DNA and extract your unique stylistic fingerprint.',
                    placeholder: 'Paste a sample of your best writing here (emails, captions, blog posts)...',
                    endpoint: '/api/tools/analyze-voice',
                    payloadKey: 'userInput'
                },
                bio: { 
                    id: 'bio', 
                    title: 'Bio Builder', 
                    icon: 'user-circle', 
                    color: 'text-emerald-600', 
                    bg: 'bg-emerald-50',
                    desc: 'Expert status, instantly articulated. Clean, high-authority Instagram profiles.',
                    placeholder: 'Share your niche, experience, results, and a bit of your personality...',
                    endpoint: '/api/tools/generate-bio',
                    payloadKey: 'userInput'
                },
                hook: { 
                    id: 'hook', 
                    title: 'Find Your Hook', 
                    icon: 'anchor', 
                    color: 'text-amber-600', 
                    bg: 'bg-amber-50',
                    desc: 'Stop the scroll with 3 distinct types of psychological opening lines.',
                    placeholder: 'e.g. Why most wellness routines fail...',
                    endpoint: '/api/tools/generate-hook',
                    payloadKey: 'idea'
                },
                multiplier: { 
                    id: 'multiplier', 
                    title: 'The Multiplier', 
                    icon: 'zap', 
                    color: 'text-purple-600', 
                    bg: 'bg-purple-50',
                    desc: 'Turn one "Core Truth" into 3 high-leverage weekly content assets.',
                    placeholder: 'Paste your core truth, a draft, or a published post here...',
                    endpoint: '/api/tools/generate-multiplier',
                    payloadKey: 'userInput'
                },
                plan: { 
                    id: 'plan', 
                    title: 'Content Planner', 
                    icon: 'calendar', 
                    color: 'text-stone-600', 
                    bg: 'bg-stone-100',
                    desc: 'Mapping out a sustainable 3-post weekly rhythm from one theme.',
                    placeholder: 'e.g. Launching my meditation course',
                    endpoint: '/api/tools/plan-weekly',
                    payloadKey: 'themeInput'
                }
            };

            useEffect(() => {
                const handleMessage = (event) => {
                    const allowedOrigins = [
                        "https://www.freespiritmarketer.com",
                        "https://freespiritmarketer.com",
                        "https://gmajors1326.wixsite.com"
                    ];
                    if (!allowedOrigins.includes(event.origin) && !event.origin.endsWith(".wix.com")) return;

                    if (event.data.type === 'USER_DATA') {
                        const incomingTier = mapTier(event.data.tier || 'Free');
                        const oldTier = userStats.tier;
                        
                        setUserStats(prev => ({
                            ...prev,
                            tier: incomingTier,
                            dailyLimit: tiers[incomingTier]?.limit || 14,
                            usage: event.data.usage || prev.usage
                        }));

                        if (rank(incomingTier) > rank(oldTier)) {
                            setSuccessMessage(`Plan Updated! You are now on the ${incomingTier} tier. 🌿✨`);
                        }
                    }
                };

                window.addEventListener('message', handleMessage);
                
                // Initial request
                const targetOrigin = window.location.origin.includes('freespiritmarketer') ? "https://www.freespiritmarketer.com" : "*";
                window.parent.postMessage({ type: 'GET_USER_DATA' }, targetOrigin);

                return () => window.removeEventListener('message', handleMessage);
            }, [userStats.tier]);

            useEffect(() => {
                lucide.createIcons();
            }, [activeTool, userStats, result]);

            const mapTier = (tier) => {
                const s = tier.toLowerCase();
                if (s.includes('elite')) return 'Elite';
                if (s.includes('pro')) return 'Pro';
                if (s.includes('starter') || s.includes('launch') || s.includes('kit')) return 'Starter';
                return 'Free';
            };

            const rank = (t) => t === 'Elite' ? 3 : t === 'Pro' ? 2 : t === 'Starter' ? 1 : 0;

            const refreshPlan = () => {
                setIsSyncing(true);
                const targetOrigin = window.location.origin.includes('freespiritmarketer') ? "https://www.freespiritmarketer.com" : "*";
                window.parent.postMessage({ type: 'SYNC_PLAN' }, targetOrigin);
                setTimeout(() => {
                    window.parent.postMessage({ type: 'GET_USER_DATA' }, targetOrigin);
                    setTimeout(() => setIsSyncing(false), 1000);
                }, 500);
            };

            const goToUpgrade = () => {
                const url = `https://www.freespiritmarketer.com/pricing-plans?currentTier=${userStats.tier}`;
                const link = document.createElement('a');
                link.href = url;
                link.target = '_top';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleGenerate = async () => {
                const tool = tools[activeTool];
                const used = userStats.usage[activeTool] || 0;
                
                if (used >= userStats.dailyLimit) {
                    setResult({ type: 'limit' });
                    return;
                }

                setLoading(true);
                try {
                    const response = await fetch(tool.endpoint, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ [tool.payloadKey]: input, tier: userStats.tier })
                    });

                    if (!response.ok) throw new Error('API request failed');

                    const data = await response.json();
                    setResult(data.data);

                    // Update local state
                    const newUsage = { ...userStats.usage, [activeTool]: used + 1 };
                    setUserStats(prev => ({ ...prev, usage: newUsage }));

                    // Notify Wix
                    const totalRuns = Object.values(newUsage).reduce((a, b) => a + b, 0);
                    const targetOrigin = window.location.origin.includes('freespiritmarketer') ? "https://www.freespiritmarketer.com" : "*";
                    window.parent.postMessage({
                        type: 'UPDATE_USAGE',
                        newCount: totalRuns,
                        toolType: activeTool,
                        toolUsedCount: newUsage[activeTool]
                    }, targetOrigin);

                } catch (err) {
                    console.error(err);
                    setResult({ type: 'error', message: err.message });
                } finally {
                    setLoading(false);
                }
            };

            const copyToClipboard = (text, e) => {
                navigator.clipboard.writeText(text);
                const originalText = e.target.innerText;
                e.target.innerText = 'Copied! ✨';
                setTimeout(() => e.target.innerText = originalText, 2000);
            };

            if (activeTool === 'help-support') {
                return (
                    <div className="max-w-3xl mx-auto px-6 py-10 animate-fade-in">
                        <button onClick={() => setActiveTool('home')} className="flex items-center gap-2 text-stone-400 hover:text-stone-600 mb-8 transition-colors">
                            <i data-lucide="arrow-left" className="w-4 h-4"></i> Back to Dashboard
                        </button>
                        
                        <div className="bg-white rounded-[2rem] shadow-sm border border-stone-100 p-8 md:p-12">
                            <h2 className="text-3xl font-serif text-[#7d8a70] mb-8 flex items-center gap-3">
                                🧭 Member Guide
                            </h2>
                            
                            <div className="space-y-12 text-stone-600 leading-relaxed">
                                <section>
                                    <h3 className="text-xl font-bold text-stone-800 mb-4">1. How to Use the Tools</h3>
                                    <p className="mb-6">Every tool follows a simple Input → Architecture → Asset flow:</p>
                                    <ul className="space-y-4">
                                        <li className="flex gap-4 items-start">
                                            <span className="text-xl">🌿</span>
                                            <p><span className="font-bold text-stone-800">Input:</span> Paste a messy thought, a rough draft, or a simple topic.</p>
                                        </li>
                                        <li className="flex gap-4 items-start">
                                            <span className="text-xl">🌿</span>
                                            <p><span className="font-bold text-stone-800">Generate:</span> Click the button to let the AI analyze your "Creative DNA."</p>
                                        </li>
                                        <li className="flex gap-4 items-start">
                                            <span className="text-xl">🌿</span>
                                            <p><span className="font-bold text-stone-800">Result:</span> You will receive a structured breakdown. Each generation counts as one run.</p>
                                        </li>
                                    </ul>
                                </section>

                                <section className="bg-stone-50 rounded-2xl p-6 border border-stone-100">
                                    <h3 className="text-lg font-bold text-[#7d8a70] mb-4 flex items-center gap-2">
                                        <i data-lucide="refresh-cw" className="w-5 h-5"></i> The "Companion" Workflow
                                    </h3>
                                    <div className="grid gap-4 text-sm">
                                        <p><strong>1. Find Your Voice:</strong> Paste your notes to make sure the AI knows how you talk.</p>
                                        <p><strong>2. Find Your Hook:</strong> Input your topic to get 3 scroll-stopping headlines.</p>
                                        <p><strong>3. The Multiplier:</strong> Take your favorite Hook and paste it here.</p>
                                        <p className="italic text-stone-400 mt-2">Result: You now have 3 full posts ready for the week.</p>
                                    </div>
                                </section>

                                <section>
                                    <h3 className="text-xl font-bold text-stone-800 mb-4">2. Understanding Your Runs</h3>
                                    <p className="mb-4">Your creative capacity is measured in Monthly Runs.</p>
                                    <p className="text-sm">Runs refresh automatically on the 1st of every month. You can check your balance in the top-right corner of the home screen.</p>
                                </section>

                                <section>
                                    <h3 className="text-xl font-bold text-stone-800 mb-4">3. Troubleshooting & FAQ</h3>
                                    <div className="border border-stone-100 rounded-xl overflow-hidden">
                                        <table className="w-full text-sm text-left">
                                            <thead className="bg-stone-50 border-bottom border-stone-100">
                                                <tr>
                                                    <th className="p-4 font-bold text-stone-800">Question</th>
                                                    <th className="p-4 font-bold text-stone-800">Answer</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-stone-100">
                                                <tr>
                                                    <td className="p-4 font-medium">Generate button grey?</td>
                                                    <td className="p-4 text-stone-400">Reached monthly limit or text box is empty.</td>
                                                </tr>
                                                <tr>
                                                    <td className="p-4 font-medium">Can I save results?</td>
                                                    <td className="p-4 text-stone-400">Results are "live." Copy favorites immediately.</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </section>
                            </div>
                        </div>
                    </div>
                );
            }

            if (activeTool !== 'home') {
                const tool = tools[activeTool];
                const used = userStats.usage[activeTool] || 0;
                const remaining = userStats.dailyLimit - used;

                return (
                    <div className="max-w-3xl mx-auto px-6 py-10 animate-fade-in">
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={() => {setActiveTool('home'); setResult(null); setInput('');}} className="flex items-center gap-2 text-stone-400 hover:text-stone-600 transition-colors">
                                <i data-lucide="arrow-left" className="w-4 h-4"></i> Back
                            </button>
                            <div className="flex gap-3 items-center">
                                <div className={`text-[10px] font-bold tracking-widest uppercase px-3 py-1 rounded-full ${remaining <= 0 ? 'bg-red-50 text-red-500' : 'bg-stone-100 text-stone-500'}`}>
                                    {remaining <= 0 ? 'Limit Reached' : `${remaining}/${userStats.dailyLimit} Runs Remaining`}
                                </div>
                                <button onClick={goToUpgrade} className="text-[10px] font-bold tracking-widest uppercase bg-stone-900 text-white px-3 py-1 rounded-full hover:bg-black transition-colors">
                                    Upgrade
                                </button>
                            </div>
                        </div>

                        <div className="bg-white rounded-[2rem] shadow-sm border border-stone-100 p-8 md:p-12">
                            <div className="flex items-center gap-4 mb-6">
                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center ${tool.bg} ${tool.color}`}>
                                    <i data-lucide={tool.icon} className="w-6 h-6"></i>
                                </div>
                                <h2 className="text-3xl font-serif text-stone-800">{tool.title}</h2>
                            </div>
                            
                            <p className="text-stone-500 mb-8 leading-relaxed">{tool.desc}</p>
                            
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-bold uppercase tracking-widest text-stone-300 block mb-3">Input Data</label>
                                    <textarea 
                                        value={input} 
                                        onChange={(e) => setInput(e.target.value)} 
                                        className="w-full h-40 p-5 bg-stone-50 rounded-2xl border border-stone-100 outline-none focus:border-[#7d8a70] focus:bg-white transition-all resize-none text-stone-600" 
                                        placeholder={tool.placeholder} 
                                    />
                                </div>

                                {remaining <= 0 ? (
                                    <button onClick={goToUpgrade} className="w-full py-5 bg-white border-2 border-[#7d8a70] text-[#7d8a70] rounded-2xl font-bold hover:bg-[#7d8a70] hover:text-white transition-all">
                                        Upgrade to Generate More ✨
                                    </button>
                                ) : (
                                    <button 
                                        onClick={handleGenerate} 
                                        disabled={loading || !input.trim()} 
                                        className="w-full py-5 bg-[#7d8a70] text-white rounded-2xl font-bold shadow-lg shadow-[#7d8a70]/20 hover:bg-[#6a765f] disabled:bg-stone-200 disabled:shadow-none transition-all flex items-center justify-center gap-3"
                                    >
                                        {loading ? (
                                            <>Generating Clarity... <i data-lucide="refresh-cw" className="w-5 h-5 spinner"></i></>
                                        ) : "Generate Asset"}
                                    </button>
                                )}
                            </div>
                        </div>

                        {result && result.type === 'limit' && (
                             <div className="mt-8 p-10 bg-white rounded-[2rem] border-2 border-dashed border-stone-100 text-center animate-fade-in">
                                <h4 className="font-serif text-2xl mb-4">Expand Your Toolkit 🌿</h4>
                                <p className="text-stone-500 mb-8">You've reached your limit for this tool. Ready for more creative capacity?</p>
                                <button onClick={goToUpgrade} className="px-8 py-4 bg-stone-900 text-white rounded-xl font-bold hover:bg-black transition-all">
                                    Explore Plans
                                </button>
                             </div>
                        )}

                        {result && !result.type && (
                            <div className="mt-8 space-y-6 animate-fade-in">
                                {activeTool === 'bio' ? (
                                    <div className="p-8 bg-white rounded-[2rem] border border-stone-100 shadow-sm">
                                        <div className="bg-stone-50 p-6 rounded-2xl text-lg leading-relaxed text-stone-800 whitespace-pre-wrap font-sans mb-6">
                                            {result.insta_bio}
                                        </div>
                                        <button 
                                            onClick={(e) => copyToClipboard(result.insta_bio, e)}
                                            className="px-6 py-3 bg-white border-2 border-[#7d8a70] text-[#7d8a70] rounded-xl font-bold hover:bg-[#7d8a70] hover:text-white transition-all"
                                        >
                                            Copy Bio
                                        </button>
                                    </div>
                                ) : activeTool === 'voice' ? (
                                    <>
                                        <div className="grid md:grid-cols-2 gap-6">
                                            <div className="p-6 bg-white rounded-[2rem] border border-stone-100 shadow-sm">
                                                <h4 className="text-[10px] font-bold uppercase tracking-widest text-[#7d8a70] mb-4">Voice DNA</h4>
                                                <p className="font-serif text-xl text-stone-800">{result.your_voice_dna}</p>
                                            </div>
                                            <div className="p-6 bg-white rounded-[2rem] border border-stone-100 shadow-sm">
                                                <h4 className="text-[10px] font-bold uppercase tracking-widest text-red-400 mb-4">The Filter</h4>
                                                <p className="text-stone-600">{result.the_filter}</p>
                                            </div>
                                        </div>
                                        <div className="p-8 bg-white rounded-[2rem] border border-stone-100 shadow-sm">
                                            <h4 className="text-[10px] font-bold uppercase tracking-widest text-stone-400 mb-4">Signature Patterns</h4>
                                            <div className="space-y-3">
                                                {result.signature_patterns.split('\n').map((p, i) => (
                                                    <div key={i} className="flex gap-3 text-stone-600">
                                                        <span className="text-[#7d8a70]">🌿</span> {p.replace(/^- /, '')}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="p-8 bg-indigo-50/30 border border-indigo-100 rounded-[2rem]">
                                            <h4 className="text-[10px] font-bold uppercase tracking-widest text-indigo-500 mb-4">Aha! Moment: Your Voice in Action</h4>
                                            <p className="italic text-lg text-indigo-900 leading-relaxed">"{result.voice_sample}"</p>
                                        </div>
                                    </>
                                ) : (
                                    <div className="space-y-6">
                                        {Object.entries(result).map(([k, v]) => (
                                            <div key={k} className="p-8 bg-white rounded-[2rem] border border-stone-100 shadow-sm">
                                                <h4 className="text-[10px] font-bold uppercase tracking-widest text-[#7d8a70] mb-4">{k.replace(/_/g, ' ')}</h4>
                                                <p className="text-stone-600 leading-relaxed whitespace-pre-wrap">{v}</p>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto px-6 py-12 md:py-20 animate-fade-in">
                    {successMessage && (
                        <div className="mb-8 p-4 bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-2xl flex justify-between items-center animate-fade-in">
                            <p className="flex items-center gap-2">
                                <i data-lucide="check-circle" className="w-5 h-5"></i> {successMessage}
                            </p>
                            <button onClick={() => setSuccessMessage('')} className="text-emerald-400 hover:text-emerald-600">
                                <i data-lucide="x" className="w-4 h-4"></i>
                            </button>
                        </div>
                    )}

                    <div className="flex flex-col md:flex-row justify-between items-center gap-8 mb-16 text-center md:text-left">
                        <div>
                            <h1 className="text-4xl md:text-5xl font-serif text-[#7d8a70] mb-3">The Companion Suite</h1>
                            <p className="text-stone-400 text-lg">Your creative sanctuary for high-authority content.</p>
                            <button 
                                onClick={refreshPlan} 
                                className="mt-6 flex items-center gap-2 text-[10px] font-bold tracking-widest uppercase text-stone-400 hover:text-stone-600 transition-colors"
                            >
                                <i data-lucide="refresh-cw" className={`w-3 h-3 ${isSyncing ? 'spinner' : ''}`}></i> 
                                {isSyncing ? 'Refreshing...' : 'Refresh Plan'}
                            </button>
                        </div>

                        <div className="bg-white p-8 rounded-[2rem] border border-stone-100 shadow-sm text-center min-w-[240px]">
                            <div className={`text-[10px] font-bold tracking-widest uppercase mb-2 ${tiers[userStats.tier]?.color}`}>
                                ✦ {userStats.tier} Plan
                            </div>
                            <div className="text-4xl font-bold text-stone-800 mb-2">
                                {Object.values(userStats.usage).reduce((a, b) => a + b, 0)}/{userStats.dailyLimit}
                            </div>
                            <div className="text-[10px] font-bold uppercase text-stone-300 tracking-tighter">Total Runs Used This Month</div>
                            <button onClick={goToUpgrade} className="mt-6 w-full py-3 bg-stone-900 text-white rounded-xl text-xs font-bold hover:bg-black transition-all">
                                Upgrade Plan
                            </button>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {Object.values(tools).map(t => (
                            <div 
                                key={t.id} 
                                onClick={() => setActiveTool(t.id)} 
                                className="group bg-white p-8 rounded-[2rem] border border-stone-100 cursor-pointer transition-all tool-card-hover"
                            >
                                <div className={`w-14 h-14 rounded-2xl flex items-center justify-center mb-6 transition-transform group-hover:scale-110 ${t.bg} ${t.color}`}>
                                    <i data-lucide={t.icon} className="w-7 h-7"></i>
                                </div>
                                <h3 className="text-2xl font-bold text-stone-800 mb-3">{t.title}</h3>
                                <p className="text-stone-400 text-sm leading-relaxed">{t.desc}</p>
                                <div className="mt-6 flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-[#7d8a70] opacity-0 group-hover:opacity-100 transition-opacity">
                                    Open Tool <i data-lucide="chevron-right" className="w-3 h-3"></i>
                                </div>
                            </div>
                        ))}
                        
                        <div 
                            onClick={() => setActiveTool('help-support')}
                            className="bg-[#7d8a70] p-8 rounded-[2rem] cursor-pointer hover:bg-[#6a765f] transition-all flex flex-col justify-between"
                        >
                            <div className="w-14 h-14 bg-white/10 rounded-2xl flex items-center justify-center text-white">
                                <i data-lucide="compass" className="w-7 h-7"></i>
                            </div>
                            <div>
                                <h3 className="text-2xl font-bold text-white mb-2">Member Guide</h3>
                                <p className="text-white/60 text-sm">Need help? Explore the Companion workflow and troubleshooting tips.</p>
                            </div>
                        </div>
                    </div>

                    <div className="mt-16 pt-12 border-t border-stone-100 text-center">
                        <div className="inline-flex items-center gap-8 bg-white px-8 py-4 rounded-full border border-stone-100 shadow-sm">
                            <div className="flex items-center gap-2 text-stone-300">
